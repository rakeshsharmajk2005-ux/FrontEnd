<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <p>Hello everyone</p>
    <input type="text" id="inp1" onkeydown="keypress()">
    <button onclick="msg()">Click Me</button>
    <button id="btn1" ondblclick="dclick()">Double Click </button>
    <h1 id="heading1" onmouseover="mouseOver()" onmouseout="mouseOut()">Hello</h1>
     <button id="btn">EventListener</button>
  </body>
  <script>
    function msg(){
      alert("Button Clicked");
    }
    function dclick(){
      document.getElementById("btn1").innerHTML="Double time Clicked";
    }
    function mouseOver(){
      document.getElementById("heading1").style.color="red";
    }
    function mouseOut(){
      document.getElementById("heading1").style.color="green";
    }
    function keypress(){
      alert("Key pressed");
    }

    let button=document.getElementById("btn");
    button.addEventListener("click",function(){
      alert("EventListener button Clicked");
    });
    button.addEventListener("mouseover",function(){
      document.getElementById("btn").style.color="red";
    });
     button.addEventListener("mouseout",function(){
      document.getElementById("btn").style.color="green";
    });
    
  </script>
</html>
