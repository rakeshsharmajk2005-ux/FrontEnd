<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.calculator{
    width:340px;
    background:#222;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

#display{
    width:100%;
    height:70px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#111;
    color:#fff;
    font-size:32px;
    text-align:right;
    padding:15px;
    margin-bottom:15px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:10px;
    font-size:22px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#444;
    color:#fff;
}

.operator{
    background:#ff9800;
    color:white;
}

.equal{
    background:#4CAF50;
    color:white;
    grid-column:span 2;
}

.clear{
    background:#f44336;
    color:white;
}

.back{
    background:#607D8B;
    color:white;
}
</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="back" onclick="backspace()">⌫</button>
<button class="operator" onclick="appendValue('%')">%</button>
<button class="operator" onclick="appendValue('/')">/</button>

<button class="number" onclick="appendValue('7')">7</button>
<button class="number" onclick="appendValue('8')">8</button>
<button class="number" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('*')">*</button>

<button class="number" onclick="appendValue('4')">4</button>
<button class="number" onclick="appendValue('5')">5</button>
<button class="number" onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('-')">-</button>

<button class="number" onclick="appendValue('1')">1</button>
<button class="number" onclick="appendValue('2')">2</button>
<button class="number" onclick="appendValue('3')">3</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button class="number" onclick="appendValue('0')">0</button>
<button class="number" onclick="appendValue('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

let display=document.getElementById("display");

function appendValue(value){
    display.value+=value;
}

function clearDisplay(){
    display.value="";
}

function backspace(){
    display.value=display.value.slice(0,-1);
}

function calculate(){

    try{

        let expression=display.value.replace(/%/g,"/100");

        display.value=eval(expression);

    }

    catch{

        display.value="Error";

        setTimeout(()=>{
            display.value="";
        },1000);
    }
}

// Keyboard Support
document.addEventListener("keydown",function(e){

    const key=e.key;

    if((key>='0' && key<='9') ||
       key==='+' ||
       key==='-' ||
       key==='*' ||
       key==='/' ||
       key==='.' ||
       key==='%'){

        appendValue(key);
    }

    else if(key==="Enter"){
        calculate();
    }

    else if(key==="Backspace"){
        backspace();
    }

    else if(key==="Escape"){
        clearDisplay();
    }

});

</script>

</body>
</html>
